# -- Theme Options --
# https://blowfish.page/docs/configuration/#theme-parameters

colorScheme = "ocean"
defaultAppearance = "dark" # valid options: light or dark
autoSwitchAppearance = true


enableSearch = true
enableCodeCopy = true	
enableStructuredBreadcrumbs = true 	
highlightCurrentMenuArea = true         
smartTOC = true                         



disableImageOptimization = false
disableImageOptimizationMD = false
disableTextInHeader = false


[header]
  layout = "fixed-fill-blur" # valid options: basic, fixed, fixed-fill, fixed-gradient, fixed-fill-blur

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile" # valid options: page, profile, hero, card, background, custom
  showRecent = true		
  showRecentItems = 5
  showMoreLink = true		
  showMoreLinkDest = "/blog/"	
  cardView = true		
  cardViewScreenWidth = false
  
[article]
  showDate = true
  showDateUpdated = false
  showAuthor = true
  showHero = true		
  heroStyle = "big" 		# valid options: basic, big, background, thumbAndBackground	    		
  layoutBackgroundBlur = true 	# only used when heroStyle equals background or thumbAndBackground
  showBreadcrumbs = true	
  showDraftLabel = true	
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = true	
  showRelatedContent = true	
  relatedContentLimit = 3
  showTaxonomies = true 	# use showTaxonomies OR showCategoryOnly, not both	
  showWordCount = false	
  sharingLinks = [ "linkedin", "x-twitter", "reddit", "email",]	# ADD — share buttons
  externalLinkForceNewTab = true # disable to allow external links in the same tab (defaults to true).

[list]
  showBreadcrumbs = true
  showSummary = true		
  showTableOfContents = false
  showCards = true		
  groupByYear = true
  cardView = true		


[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  showBreadcrumbs = true		
  cardView = false

[term]
  showBreadcrumbs = true		
  showTableOfContents = false
  groupByYear = false
  cardView = true			

