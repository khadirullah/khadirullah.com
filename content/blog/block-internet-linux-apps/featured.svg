<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- Subtle Grid Pattern in Background -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <path d="M 0 52.5 L 1200 52.5 M 0 105 L 1200 105 M 0 157.5 L 1200 157.5 M 0 210 L 1200 210 M 0 262.5 L 1200 262.5 M 0 315 L 1200 315 M 0 367.5 L 1200 367.5 M 0 420 L 1200 420 M 0 472.5 L 1200 472.5 M 0 525 L 1200 525 M 0 577.5 L 1200 577.5"/>
    <path d="M 100 0 L 100 630 M 200 0 L 200 630 M 300 0 L 300 630 M 400 0 L 400 630 M 500 0 L 500 630 M 600 0 L 600 630 M 700 0 L 700 630 M 800 0 L 800 630 M 900 0 L 900 630 M 1000 0 L 1000 630 M 1100 0 L 1100 630"/>
  </g>

  <!-- Laptop (Left) -->
  <g transform="translate(150, 215)">
    <!-- Screen border -->
    <rect x="0" y="0" width="240" height="150" rx="10" fill="none" stroke="#38bdf8" stroke-width="8"/>
    <!-- Screen content -->
    <rect x="15" y="15" width="210" height="120" fill="#0c4a6e" opacity="0.5"/>
    <text x="35" y="50" font-family="monospace" font-size="20" fill="#38bdf8" font-weight="bold">> _</text>
    <rect x="35" y="70" width="100" height="8" fill="#38bdf8" opacity="0.4"/>
    <rect x="35" y="90" width="140" height="8" fill="#38bdf8" opacity="0.4"/>
    <rect x="35" y="110" width="80" height="8" fill="#38bdf8" opacity="0.4"/>
    <!-- Keyboard base -->
    <path d="M -20 160 L 260 160 L 250 180 L -10 180 Z" fill="#38bdf8"/>
    <!-- Trackpad cutout -->
    <rect x="90" y="165" width="60" height="10" fill="#0f172a" rx="2"/>
  </g>

  <!-- Glowing Firewall Shield (Center) -->
  <g transform="translate(500, 165)">
    <!-- Outer Glow -->
    <path d="M 100 0 L 190 30 L 190 150 C 190 230 100 290 100 290 C 100 290 10 230 10 150 L 10 30 Z" fill="none" stroke="#2dd4bf" stroke-width="16" opacity="0.3" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- Main Shield Outline -->
    <path d="M 100 0 L 190 30 L 190 150 C 190 230 100 290 100 290 C 100 290 10 230 10 150 L 10 30 Z" fill="#134e4a" stroke="#2dd4bf" stroke-width="10" stroke-linejoin="round"/>
    <!-- Inner Shield Details (Brick pattern representing firewall rules) -->
    <path d="M 30 70 L 170 70" stroke="#2dd4bf" stroke-width="6" stroke-opacity="0.6"/>
    <path d="M 30 110 L 170 110" stroke="#2dd4bf" stroke-width="6" stroke-opacity="0.6"/>
    <path d="M 30 150 L 170 150" stroke="#2dd4bf" stroke-width="6" stroke-opacity="0.6"/>
    <path d="M 30 190 L 160 190" stroke="#2dd4bf" stroke-width="6" stroke-opacity="0.6"/>
    
    <path d="M 70 70 L 70 110" stroke="#2dd4bf" stroke-width="6" stroke-opacity="0.6"/>
    <path d="M 130 70 L 130 110" stroke="#2dd4bf" stroke-width="6" stroke-opacity="0.6"/>
    <path d="M 100 110 L 100 150" stroke="#2dd4bf" stroke-width="6" stroke-opacity="0.6"/>
    <path d="M 50 150 L 50 190" stroke="#2dd4bf" stroke-width="6" stroke-opacity="0.6"/>
    <path d="M 150 150 L 150 190" stroke="#2dd4bf" stroke-width="6" stroke-opacity="0.6"/>
    
    <!-- Shield Checkmark -->
    <path d="M 60 140 L 90 170 L 140 100" fill="none" stroke="#ccfbf1" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Connective lines (Laptop to Shield) -->
  <line x1="410" y1="315" x2="490" y2="315" stroke="#38bdf8" stroke-width="8" stroke-dasharray="12,8"/>

  <!-- Allowed Route: LAN (Top Right) -->
  <g>
    <!-- Green Line with Flow -->
    <path d="M 720 315 L 750 315 C 770 315 780 305 780 285 L 780 165 C 780 145 790 135 810 135 L 860 135" fill="none" stroke="#4ade80" stroke-width="8" stroke-linejoin="round"/>
    <polygon points="855,125 875,135 855,145" fill="#4ade80"/>
    
    <!-- House/LAN Icon -->
    <g transform="translate(890, 75)">
      <path d="M 60 0 L 120 50 L 120 120 L 0 120 L 0 50 Z" fill="#14532d" stroke="#4ade80" stroke-width="8" stroke-linejoin="round"/>
      <!-- Roof -->
      <path d="M -10 60 L 60 -5 L 130 60" fill="none" stroke="#4ade80" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Door -->
      <rect x="40" y="70" width="40" height="50" fill="#4ade80"/>
      <!-- Text label (small) -->
      <text x="60" y="150" font-family="sans-serif" font-weight="bold" font-size="18" fill="#4ade80" text-anchor="middle" letter-spacing="2">LOCAL LAN</text>
    </g>
  </g>

  <!-- Blocked Route: Internet (Bottom Right) -->
  <g>
    <!-- Red Line -->
    <path d="M 720 315 L 750 315 C 770 315 780 325 780 345 L 780 465 C 780 485 790 495 810 495 L 830 495" fill="none" stroke="#f87171" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Red X -->
    <g transform="translate(845, 495)">
      <line x1="-15" y1="-15" x2="15" y2="15" stroke="#f87171" stroke-width="10" stroke-linecap="round"/>
      <line x1="15" y1="-15" x2="-15" y2="15" stroke="#f87171" stroke-width="10" stroke-linecap="round"/>
    </g>

    <!-- Globe/Internet Icon -->
    <g transform="translate(890, 435)" opacity="0.6">
      <circle cx="60" cy="60" r="60" fill="none" stroke="#f87171" stroke-width="8"/>
      <ellipse cx="60" cy="60" rx="25" ry="60" fill="none" stroke="#f87171" stroke-width="6"/>
      <line x1="0" y1="60" x2="120" y2="60" stroke="#f87171" stroke-width="6"/>
      <line x1="15" y1="25" x2="105" y2="25" stroke="#f87171" stroke-width="6"/>
      <line x1="15" y1="95" x2="105" y2="95" stroke="#f87171" stroke-width="6"/>
      <!-- Text label (small) -->
      <text x="60" y="150" font-family="sans-serif" font-weight="bold" font-size="18" fill="#f87171" text-anchor="middle" letter-spacing="2">INTERNET</text>
    </g>
  </g>

  <!-- Filter effects -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

</svg>
